# MediAssist API (Render) — optional; prefer Railway — see DEPLOY.md
services:
  - type: web
    name: mediassist-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: APP_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: STORAGE_ENABLED
        value: "true"
      - key: GCS_BUCKET
        sync: false
      - key: GCS_PROJECT
        sync: false
      # Option A: paste full service-account JSON (recommended on Render)
      - key: GCS_CREDENTIALS_JSON
        sync: false
      # Option B: secret file mount path (see DEPLOY.md)
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
